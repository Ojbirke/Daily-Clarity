# Reference copy of the server block added to the shared reverse proxy at
# ~/devportal/docker/nginx-proxy.conf on the Hetzner server (65.21.1.29).
# It lives inside the existing `http { }` block, next to the managemyapps.app
# and teamup.managemyapps.app server blocks. Do not deploy this file on its own.

server {
    listen 443 ssl;
    server_name dailyclarity.managemyapps.app;

    ssl_certificate /etc/letsencrypt/live/dailyclarity.managemyapps.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dailyclarity.managemyapps.app/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;

    root /var/www/dailyclarity;
    index privacy.html;

    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}

# HTTP->HTTPS + ACME challenges are already handled by the shared
# `listen 80 default_server` block at the top of nginx-proxy.conf.
